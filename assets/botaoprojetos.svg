<svg width="520" height="140" viewBox="0 0 520 140" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <!-- Gradient -->
    <linearGradient id="borderGradient" x1="0" y1="0" x2="520" y2="140">
      <stop offset="0%" stop-color="#ff008c"></stop>
      <stop offset="100%" stop-color="#ff4dc4"></stop>
    </linearGradient>

    <!-- Background -->
    <linearGradient id="bgGradient" x1="0" y1="0" x2="0" y2="140">
      <stop offset="0%" stop-color="#2b0018"></stop>
      <stop offset="100%" stop-color="#14000c"></stop>
    </linearGradient>
  </defs>

  <!-- Background -->
  <path d="M18 18 
       H455 
       L500 70 
       L455 122 
       H18 
       Q10 122 10 114 
       V26 
       Q10 18 18 18 Z" fill="url(#bgGradient)"></path>

  <!-- Outer Glow -->
  <path d="M18 18 
       H455 
       L500 70 
       L455 122 
       H18 
       Q10 122 10 114 
       V26 
       Q10 18 18 18 Z" stroke="url(#borderGradient)" stroke-width="4" opacity="0.8" filter="url(#glow)" fill="none"></path>

  <!-- Main Border -->
  <path d="M18 18 
       H455 
       L500 70 
       L455 122 
       H18 
       Q10 122 10 114 
       V26 
       Q10 18 18 18 Z" stroke="#ff4dc4" stroke-width="2" fill="none"></path>

  <!-- Inner Border -->
  <path d="M30 30 
       H445 
       L482 70 
       L445 110 
       H30 
       Q22 110 22 102 
       V38 
       Q22 30 30 30 Z" stroke="#ff91dc" stroke-width="1" opacity="0.45" fill="none"></path>

  <!-- Arrow -->
  <g filter="url(#glow)">
    <path d="M390 70 H440" stroke="#ffd2f1" stroke-width="5" stroke-linecap="round"></path>

    <path d="M420 48 L442 70 L420 92" stroke="#ffd2f1" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"></path>
  </g>

</svg>