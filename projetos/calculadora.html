      <!-- Calculadora -->

    <section class="secao1">
        <div class="calculadoraconteudo">
          <input class="inputcalculadora" type="text" id="tela" readonly value="0">
            <div class="botoescalculadora">
              <button class="botaofunction">%</button>
              <button class="botaofunction">CE</button>
              <button class="botaofunction">C</button>
              <button class="botaofunction">⌫</button>
              <button class="botaofunction">1/x</button>
              <button class="botaofunction">x²</button>
              <button class="botaofunction">√</button>
              <button class="botaooperador">÷</button>
              <button class="botaonum">7</button>
              <button class="botaonum">8</button>
              <button class="botaonum">9</button>
              <button class="botaooperador">×</button>
              <button class="botaonum">4</button>
              <button class="botaonum">5</button>
              <button class="botaonum">6</button>
              <button class="botaooperador">-</button>
              <button class="botaonum">1</button>
              <button class="botaonum">2</button>
              <button class="botaonum">3</button>
              <button class="botaooperador">+</button>
              <button class="botaofunction">+/-</button>
              <button class="botaonum">0</button>
              <button class="botaonum">.</button>
              <button class="botaooperador">=</button>
            </div>
          </div>
        </div>
    </section>
   <script src="calculadora.js"></script>
